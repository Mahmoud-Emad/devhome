name: Release

# Push a tag like `v0.1.1` and this builds the extension, generates release notes
# from the commits since the previous tag, and publishes a GitHub Release with the
# packaged extension attached. Nothing else to do by hand.
#
#   1. bump "version" in frontend/manifest.json and frontend/package.json
#   2. git commit -am "Release v0.1.1"
#   3. git tag v0.1.1 && git push origin main --tags

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags, needed for the changelog

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify manifest version matches the tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST="$(jq -r .version frontend/manifest.json)"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag v$TAG does not match frontend/manifest.json version $MANIFEST — bump manifest.json and package.json before tagging."
            exit 1
          fi

      - name: Install, lint & build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Package extension
        run: |
          cd frontend/dist
          zip -r "../../devhome-${GITHUB_REF_NAME}.zip" .

      - name: Generate release notes from commits
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Only consider version tags (ignore non-release tags like `models`).
          PREV="$(git describe --tags --abbrev=0 --match 'v*' "${TAG}^" 2>/dev/null || true)"
          # Skip release/dependency/merge bookkeeping commits — keep the real changes.
          SKIP='^- (Release v|Bump |Merge |chore: release)'
          RANGE="${PREV:+$PREV..}${TAG}"
          CHANGES="$(git log --no-merges --pretty='- %s (%h)' "$RANGE" | grep -vE "$SKIP" || true)"
          {
            echo "### Changes${PREV:+ since $PREV}"
            echo
            echo "${CHANGES:-- (no notable changes)}"
            if [ -n "$PREV" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
            fi
          } > RELEASE_NOTES.md
          echo "----- generated notes -----"
          cat RELEASE_NOTES.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET="devhome-${TAG}.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "devhome $TAG" --notes-file RELEASE_NOTES.md
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" --title "devhome $TAG" --notes-file RELEASE_NOTES.md "$ASSET"
          fi
