<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevHome - New Tab</title>
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/icon48.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon16.png" />
  </head>
  <body>
    <div id="bg-layer" class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <main class="stage">
      <section class="center">
        <div id="clock" class="clock"></div>
        <p id="subtitle" class="subtitle"></p>
        <div id="search" class="search"></div>
      </section>
    </main>

    <div class="dock-cluster">
      <nav id="app-dock" class="app-dock" aria-label="Apps"></nav>
      <p id="dock-tip" class="dock-tip" aria-live="polite"></p>
    </div>

    <aside class="home-rail">
      <div id="home-readit"></div>
      <div id="home-weather"></div>
      <div id="home-focus"></div>
      <div id="home-widgets" class="home-widgets"></div>
    </aside>

    <div class="dock dock-left">
      <span id="bg-credit" class="credit"></span>
      <a
        class="support-link"
        href="https://buymeacoffee.com/omdanii"
        target="_blank"
        rel="noopener noreferrer"
        title="Buy me a coffee"
      >
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
          <path
            d="M12 21s-6.7-4.35-9.33-8.07C.9 10.27 1.27 6.9 3.7 5.4a4.6 4.6 0 0 1 5.8 1.1L12 9.2l2.5-2.7a4.6 4.6 0 0 1 5.8-1.1c2.43 1.5 2.8 4.87 1.03 7.53C18.7 16.65 12 21 12 21z"
          ></path>
        </svg>
        <span>Support</span>
      </a>
    </div>
    <div id="bg-bar" class="dock dock-right"></div>

    <div class="dock dock-top-right">
      <button id="release-btn" class="pill-button" title="Release notes">v0.0.0</button>
      <button id="settings-btn" class="icon-button" aria-label="Settings" title="Settings">
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="3.2"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          ></path>
        </svg>
      </button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
